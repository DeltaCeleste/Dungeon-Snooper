<!DOCTYPE html>
<html>
<head>
    <title>Ejemplo: Crear el laberinto desde un archivo</title>
    <meta charset="utf-8">
    
    <link rel="stylesheet" href="style.css">

    <script type="text/javascript" src="./libs/jquery.js"></script>
    
    <script type="importmap">
        { 
            "imports": { 
                "three"     : "./libs/three.module.js",
                "gui"       : "./libs/dat.gui.module.js",
                "trackball" : "./libs/TrackballControls.js",
                "csg"       : "./libs/three-bvh-csg.js" 
            } 
        }
    </script>
    
    <script type="module" src="./main.js" defer></script> 
</head>
<body>

    <div id="menu">
        <h1>Dungeon Snooper</h1>
        <h5>Ajustes del juego</h5>
        
        <form id="game-form">
            <div class="form-group">
                <label for="seed">Semilla para generar el laberinto:</label>
                <input type="text" name="seed" id="seed" value="laberinto">
            </div>
            
            <div class="form-group">
                <label for="difficultySelector">Dificultad:</label>
                <select name="difficulty" id="difficultySelector">
                    <option value="easy">Fácil</option>
                    <option value="medium">Media</option>
                    <option value="hard">Difícil</option>
                </select>
            </div>
            
            <button type="submit" id="game-start-button" onclick="onGameStartButtonClicked(event);">¡Jugar!</button>
        </form>
    </div>

    <div id="WebGL-output" style="display: none;"></div>

</body>
</html>
